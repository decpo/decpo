<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="senli1073" />
    <title id="title"></title>

    <!-- Immediate Theme Check Script (Prevents White Flash) -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet" />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Dark Mode CSS Overrides -->
 <!-- Dark Mode CSS Overrides -->
    <style>
        [data-theme="dark"] {
            --bs-body-bg: #121212;
            --bs-body-color: #f0f0f0;
            color-scheme: dark;
        }

        /* 1. Force dark backgrounds on the page wrapper, main area, and ALL sections */
        [data-theme="dark"],
        [data-theme="dark"] body,
        [data-theme="dark"] main,
        [data-theme="dark"] section,
        [data-theme="dark"] .section,
        [data-theme="dark"] .bg-light,
        [data-theme="dark"] .bg-white,
        [data-theme="dark"] .bg-gray,
        [data-theme="dark"] .skeleton-section,
        [data-theme="dark"] .skeleton-section-light,
        [data-theme="dark"] .skeleton-section-gray {
            background-color: #121212 !important;
            color: #f0f0f0 !important;
        }

        /* 2. Alternating subtle dark shades for section contrast */
        [data-theme="dark"] section:nth-of-type(even),
        [data-theme="dark"] .bg-gray,
        [data-theme="dark"] .skeleton-section-gray {
            background-color: #1a1a1a !important;
        }

        /* 3. Cards, Modals, and Box Containers */
        [data-theme="dark"] .card,
        [data-theme="dark"] .list-group-item,
        [data-theme="dark"] .modal-content,
        [data-theme="dark"] .dropdown-menu {
            background-color: #1e1e1e !important;
            color: #f0f0f0 !important;
            border-color: #333333 !important;
        }

        /* 4. High-Contrast Text Overrides */
        [data-theme="dark"] h1,
        [data-theme="dark"] h2,
        [data-theme="dark"] h3,
        [data-theme="dark"] h4,
        [data-theme="dark"] h5,
        [data-theme="dark"] h6,
        [data-theme="dark"] p,
        [data-theme="dark"] span,
        [data-theme="dark"] li,
        [data-theme="dark"] div,
        [data-theme="dark"] .text-dark,
        [data-theme="dark"] .text-body,
        [data-theme="dark"] .text-black {
            color: #f0f0f0 !important;
        }

        [data-theme="dark"] .text-muted,
        [data-theme="dark"] .text-secondary {
            color: #b3b3b3 !important;
        }

        /* 5. Links & Accent Colors */
        [data-theme="dark"] a {
            color: #79b8ff !important;
        }

        [data-theme="dark"] a:hover {
            color: #a5d6ff !important;
        }

        /* 6. Navigation Bar */
        [data-theme="dark"] #mainNav,
        [data-theme="dark"] .header.navbar {
            background-color: #181818 !important;
            border-bottom: 1px solid #2d2d2d !important;
        }

        [data-theme="dark"] #mainNav .nav-link,
        [data-theme="dark"] #mainNav .navbar-brand {
            color: #ffffff !important;
        }

        /* 7. MathJax Equation Formatting */
        [data-theme="dark"] .mjx-chtml,
        [data-theme="dark"] MathJax svg {
            fill: #f0f0f0 !important;
            color: #f0f0f0 !important;
        }

        /* 8. Toggle Button Styling */
        .theme-toggle-btn {
            background: transparent;
            border: none;
            color: #6c757d;
            font-size: 1.2rem;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        [data-theme="dark"] .theme-toggle-btn {
            color: #ffc107;
        }
    </style>

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

</head>

<body id="page-top" class="site-loading">

                <div class="skeleton-block skeleton-section-title"></div>
                <div class="skeleton-block skeleton-line skeleton-line-long"></div>
                <div class="skeleton-block skeleton-line"></div>
                <div class="skeleton-block skeleton-line skeleton-line-short"></div>
            </div>
        </div>
        <div class="skeleton-section skeleton-section-gray">
            <div class="container px-5">
                <div class="skeleton-block skeleton-section-title"></div>
                <div class="skeleton-block skeleton-line skeleton-line-long"></div>
                <div class="skeleton-block skeleton-line"></div>

    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">

            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul id="navbar-items" class="navbar-nav ms-auto me-4 my-3 my-lg-0"></ul>
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="theme-toggle-btn ms-lg-2" aria-label="Toggle Dark Mode">

                </button>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section" id="top-section">
        <div class="top-section-bg top-section-bg-active" aria-hidden="true"></div>
        <div class="top-section-bg" aria-hidden="true"></div>

            </div>

    <!-- Photo -->
    <div class="container px-5">
        <div id="avatar">
            <img class="shadow" src="static/assets/img/photo.png" alt="Profile photo">
        </div>
    </div>

    <main id="sections"></main>

    <!-- Footer-->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
                <a id="github-link" href="https://github.com/username">Github</a>
                <span class="mx-1">&middot;</span>
                <a id="license-link" href="https://github.com/username/username.github.io/blob/main/LICENSE">License</a>
            </div>
        </div>
    </footer>

    <!-- Theme Switcher Script -->
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'bi bi-sun-fill';
            } else {
                themeIcon.className = 'bi bi-moon-stars-fill';
            }
        }

        // Initialize icon state based on current data-theme
        const activeTheme = document.documentElement.getAttribute('data-theme') || 'light';
        updateThemeIcon(activeTheme);

        // Toggle click handler
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
            updateThemeIcon(nextTheme);
        });

        // Sync dynamically with system theme updates if user hasn't explicitly set a preference
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                const autoTheme = e.matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', autoTheme);
                updateThemeIcon(autoTheme);
            }
        });
    </script>

</body>

</html>
