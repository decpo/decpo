    <!-- Immediate Theme Check Script (Prevents White Flash) -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    <!-- Darkmode Invert -->
    </script>

  <!-- Dark Mode CSS Overrides -->
    <style>
        /* 1. Global Inversion: Flips the whole page to dark mode at the rendering layer */
        html[data-theme="dark"] {
            /* Invert lightness by 92% and rotate colors 180 degrees to keep links blueish */
            filter: invert(0.92) hue-rotate(180deg);
            /* Force a white base so the inversion always turns out dark gray/black */
            background-color: #ffffff !important; 
        }

        /* 2. Double-Invert Media: Flips images and backgrounds back to normal */
        html[data-theme="dark"] img,
        html[data-theme="dark"] video,
        html[data-theme="dark"] iframe,
        html[data-theme="dark"] canvas,
        html[data-theme="dark"] .top-section-bg,
        html[data-theme="dark"] .top-section-bg-active {
            filter: invert(1.08) hue-rotate(180deg);
        }

        /* 3. Toggle Button Styling */
        .theme-toggle-btn {
            background: transparent;
            border: none;
            color: #6c757d;
            font-size: 1.2rem;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        /* 4. Button Color adjustment (Set to blue so it inverts to gold/yellow) */
        html[data-theme="dark"] .theme-toggle-btn {
            color: #003ef8; 
        }
    </style>

    <!-- Bootstrap core JS-->

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Theme Switcher Script -->
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'bi bi-sun-fill';
            } else {
                themeIcon.className = 'bi bi-moon-stars-fill';
            }
        }

        // Initialize icon state based on current data-theme
        const activeTheme = document.documentElement.getAttribute('data-theme') || 'light';
        updateThemeIcon(activeTheme);

        // Toggle click handler
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
            updateThemeIcon(nextTheme);
        });

        // Sync dynamically with system theme updates if user hasn't explicitly set a preference
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                const autoTheme = e.matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', autoTheme);
                updateThemeIcon(autoTheme);
            }
        });
    </script>
